containers:
  - name: cart-service
    image:
      repository: public.ecr.aws/j1n2c2p2/microservices-demo/cartservice
      tag: v0.4.0
    ports:
      - cart-service-port60000

ports:
  - name: cart-service-port60000
    port: 60000
    protocol: rest
    endpoints:
      - cart-service

endpoints:
  - name: cart-service
    path: "/cart"
    methods:
      - type: 'POST'
        output: add-output
      - type: 'GET'
        output: add-output

signatures:
  - name: add-output
  - name: get-output

containers:
  - name: recommendation-service
    image:
      repository: registry.cequoi.ca/google-samples/microservices-demo/recommendationservice
      tag: v0.3.9
    dependencies:
      - product-catalog-service
    manifests:
      - gcp-microservices-demo/deploy/kubernetes/kubernetes-manifests.yaml
    ports:
      - recommendation-service-port8080
      - recommendation-service-port50000
      - recommendation-service-port60000
    envs:
      PORT: "8080"
      PRODUCT_CATALOG_SERVICE_ADDR: "product-catalog-service:3550"
      DISABLE_TRACING: "1"
      DISABLE_PROFILER: "1"
      DISABLE_DEBUGGER: "1"

ports:
  - name: recommendation-service-port50000
    protocol: thrift
    port: 50000
  - name: recommendation-service-port60000
    port: 60000
  - name: recommendation-service-port8080
    protocol: protobuf
    port: 8080

containers:
  - name: currency-service
    image:
      repository: registry.cequoi.ca/google-samples/microservices-demo/currencyservice
      tag: v0.3.9
    manifests:
      - gcp-microservices-demo/deploy/kubernetes/kubernetes-manifests.yaml
    ports:
      - currency-service-port50000
    envs:
      PORT: "7000"
      DISABLE_TRACING: "1"
      DISABLE_PROFILER: "1"
      DISABLE_DEBUGGER: "1"

ports:
  - name: currency-service-port50000
    protocol: thrift
    port: 50000

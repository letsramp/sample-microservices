containers:
  - name: product-catalog-service
    image:
      repository: public.ecr.aws/j1n2c2p2/microservices-demo/productcatalogservice
      tag: v0.3.9
    manifests:
      - gcp-microservices-demo/deploy/kubernetes/kubernetes-manifests.yaml
    ports:
      - product-catalog-service-port50000
    envs:
      PORT: "3550"
      DISABLE_STATS: "1"
      DISABLE_PROFILER: "1"
      DISABLE_TRACING: "1"

ports:
  - name: product-catalog-service-port50000
    port: 50000
    secure: false
    thrift-options:
      protocol: "binary"
      buffered: true
      http: true
      framed: false
    endpoints:
      - ProductCatalogService
    protocol: thrift

endpoints:
  - name: ProductCatalogService
    defined:
      name: ProductCatalogService
      path: "thrift/demo.thrift"
    methods:
      - name: GetProduct
        output: GetProductResponse
      - name: ListProducts
        output: ListProductsResponse
      - name: SearchProducts
        output: SearchProductsResponse

signatures:
  - name: GetProductResponse
    fields:
      - name: product
        type: struct
        default: |
          {
              "id": "OLJCESPC7Z",
              "name": "Sunglasses",
              "description": "Add a modern touch to your outfits with these sleek aviator sunglasses.",
              "picture": "/static/img/products/sunglasses.jpg",
              "priceUsd": {
                  "currencyCode": "USD",
                  "units": 19,
                  "nanos": 990000000
              },

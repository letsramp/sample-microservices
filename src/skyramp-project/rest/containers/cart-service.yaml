containers:
  - name: cart-service
    image:
      repository: registry.cequoi.ca/google-samples/microservices-demo/cartservice
      tag: v0.3.9
    dependencies:
      - redis
    manifests:
      - gcp-microservices-demo/deploy/kubernetes/kubernetes-manifests.yaml
    ports:
      - cart-service-port7070
    envs:
      REDIS_ADDR: "redis:6379"

ports:
  - name: cart-service-port7070
    protocol: protobuf
    port: 7070
